name: Tin Tech Integrity

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tin-tech-packaging/**'
      - '.github/workflows/tin-tech-integrity.yml'
  push:
    branches:
      - main
    paths:
      - 'tin-tech-packaging/**'
      - '.github/workflows/tin-tech-integrity.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            tin-tech-packaging/assets/js/content-defaults-v4.js \
            tin-tech-packaging/assets/js/api-v3.js \
            tin-tech-packaging/assets/js/cms-v4.js \
            tin-tech-packaging/assets/js/home-v4.js \
            tin-tech-packaging/assets/js/global-details-v4.js \
            tin-tech-packaging/assets/js/admin-brand-v4.js \
            tin-tech-packaging/assets/js/cms-admin-v4.js \
            tin-tech-packaging/assets/js/factory-layout-v5.js \
            tin-tech-packaging/assets/js/live-editor-v1.js \
            tin-tech-packaging/assets/js/admin-v5.js \
            tin-tech-packaging/assets/js/product-v3.js \
            tin-tech-packaging/assets/js/admin-v3.js \
            tin-tech-packaging/assets/js/portfolio.js \
            tin-tech-packaging/assets/js/contact.js \
            tin-tech-packaging/assets/js/site.js
          do
            node --check "$file"
          done

      - name: Validate Tin Tech pages and local references
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlparse

          root = Path('tin-tech-packaging')
          pages = [
              root / 'index.html',
              root / 'about.html',
              root / 'capabilities.html',
              root / 'portfolio.html',
              root / 'product.html',
              root / 'contact.html',
              root / 'privacy.html',
              root / 'terms.html',
              root / '404.html',
              root / 'admin/index.html',
          ]

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
                  self.refs = []
                  self.base_href = None
              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if values.get('id'):
                      self.ids.append(values['id'])
                  if tag == 'base' and values.get('href'):
                      self.base_href = values['href']
                  for key in ('src', 'href'):
                      if values.get(key):
                          self.refs.append(values[key])

          errors = []
          for page in pages:
              if not page.exists():
                  errors.append(f'Missing page: {page}')
                  continue
              parser = Inspector()
              parser.feed(page.read_text(encoding='utf-8'))
              duplicates = sorted({item for item in parser.ids if parser.ids.count(item) > 1})
              if duplicates:
                  errors.append(f'{page}: duplicate IDs {duplicates}')

              page_base = page.parent
              if parser.base_href:
                  page_base = (page.parent / parser.base_href).resolve()
              for ref in parser.refs:
                  parsed = urlparse(ref)
                  if parsed.scheme or ref.startswith(('#', 'mailto:', 'tel:', 'data:', 'blob:', '//')):
                      continue
                  clean = parsed.path
                  if not clean or clean.endswith('/'):
                      continue
                  target = (page_base / clean).resolve()
                  try:
                      target.relative_to(root.resolve())
                  except ValueError:
                      continue
                  if not target.exists():
                      errors.append(f'{page}: missing local reference {ref}')

          required = {
              root / 'index.html': ['data-cms-page="home"', 'home-v4.js', 'cms-v4.js', 'site-v4.css'],
              root / 'about.html': ['data-cms-page="about"', 'cms-v4.js'],
              root / 'capabilities.html': ['data-cms-page="capabilities"', 'cms-v4.js'],
              root / 'contact.html': ['data-cms-page="contact"', 'cms-v4.js', 'contact.js'],
              root / 'portfolio.html': ['data-portfolio-grid', 'cms-v4.js', 'portfolio.js'],
              root / 'product.html': ['product-v3.js', 'data-product-detail', 'cms-v4.js'],
              root / 'admin/index.html': [
                  'data-admin-tab="content"',
                  'data-admin-view="content"',
                  'cms-editor-root',
                  'cms-save-all',
                  'data-admin-tab="appearance"',
                  'appearance-preview',
                  'variant-editor',
                  'cms-admin-v4.js',
                  'admin-v4.css',
              ],
          }
          for page, tokens in required.items():
              text = page.read_text(encoding='utf-8')
              for token in tokens:
                  if token not in text:
                      errors.append(f'{page}: required token missing: {token}')

          required_files = [
              root / 'assets/css/site-v5.css',
              root / 'assets/css/site-v5-1.css',
              root / 'assets/css/live-editor-v1.css',
              root / 'assets/css/admin-v5.css',
              root / 'assets/js/factory-layout-v5.js',
              root / 'assets/js/live-editor-v1.js',
              root / 'assets/js/admin-v5.js',
          ]
          for file in required_files:
              if not file.exists():
                  errors.append(f'Missing V5 file: {file}')

          site_js = (root / 'assets/js/site.js').read_text(encoding='utf-8')
          for token in ['site-v5.css', 'site-v5-1.css', 'factory-layout-v5.js', 'tintech_edit', 'live-editor-v1.js']:
              if token not in site_js:
                  errors.append(f'Site runtime missing V5.1 token: {token}')

          responsive_css = (root / 'assets/css/site-v5-1.css').read_text(encoding='utf-8')
          for token in ['.hero-slide.active', 'position: relative', '.factory-media-section', '.product-v3-info > .variant-groups', 'order: 4']:
              if token not in responsive_css:
                  errors.append(f'V5.1 responsive stylesheet missing token: {token}')

          admin_brand = (root / 'assets/js/admin-brand-v4.js').read_text(encoding='utf-8')
          for token in ['admin-v5.css', 'admin-v5.js']:
              if token not in admin_brand:
                  errors.append(f'Admin bootstrap missing V5 token: {token}')

          live_editor = (root / 'assets/js/live-editor-v1.js').read_text(encoding='utf-8')
          for token in ['adminData', 'save-site-content', 'save-hero-slides', 'Factory readability', 'beforeunload']:
              if token not in live_editor:
                  errors.append(f'Live editor missing safety token: {token}')

          index_text = (root / 'index.html').read_text(encoding='utf-8')
          if 'home-v3.js' in index_text:
              errors.append('Homepage still references the retired single-image home-v3 runtime.')

          defaults = (root / 'assets/js/content-defaults-v4.js').read_text(encoding='utf-8')
          for token in [
              'window.TinTechContentDefaults',
              'window.TinTechDefaultHeroSlides',
              'company_name',
              'proof_items',
              'capabilities',
              'project_types',
              'logo_url',
          ]:
              if token not in defaults:
                  errors.append(f'Content defaults missing required token: {token}')

          if errors:
              raise SystemExit('\n'.join(errors))
          print('Tin Tech V5.1 integrity checks passed.')
          PY
