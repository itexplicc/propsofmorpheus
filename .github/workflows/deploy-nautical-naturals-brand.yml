name: Deploy Nautical Naturals Brand Site

on:
  push:
    branches: [main]
    paths:
      - "nautical-naturals-brand-deploy/**"
      - ".github/workflows/deploy-nautical-naturals-brand.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Rebuild complete website folder
        shell: bash
        run: |
          cat nautical-naturals-brand-deploy/part-*.txt > /tmp/site.tar.gz.b64
          base64 --decode /tmp/site.tar.gz.b64 > /tmp/site.tar.gz
          rm -rf nautical-naturals-brand
          tar -xzf /tmp/site.tar.gz
          test -f nautical-naturals-brand/index.html
          test -f nautical-naturals-brand/assets/css/site.css
          test -f nautical-naturals-brand/assets/js/site.js

      - name: Commit generated website
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nautical-naturals-brand
          if git diff --cached --quiet; then
            echo "No website changes to commit."
          else
            git commit -m "Deploy complete Nautical Naturals brand website [skip ci]"
            git push
          fi
