name: Deploy Tin Tech Packaging to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'tin-tech-packaging/**'
      - '.github/workflows/deploy-tin-tech-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare isolated public site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/tin-tech-packaging

          find tin-tech-packaging -maxdepth 1 -type f \
            \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.svg' \) \
            -exec cp {} _site/tin-tech-packaging/ \;

          touch _site/.nojekyll

          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <meta http-equiv="refresh" content="0; url=./tin-tech-packaging/">
            <title>Tin Tech Packaging</title>
            <link rel="canonical" href="./tin-tech-packaging/">
            <link rel="icon" type="image/svg+xml" href="./tin-tech-packaging/tin-tech-logo.svg">
          </head>
          <body>
            <p><a href="./tin-tech-packaging/">Open Tin Tech Packaging</a></p>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
