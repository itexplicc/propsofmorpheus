name: Deploy Public Brand Sites to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'tin-tech-packaging/**'
      - 'nautical-naturals-brand/**'
      - 'nautical-naturals/**'
      - '.github/workflows/deploy-tin-tech-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare isolated public sites
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/tin-tech-packaging
          mkdir -p _site/nautical-naturals-brand
          mkdir -p _site/nautical-naturals

          cp tin-tech-packaging/index.html _site/tin-tech-packaging/index.html
          cp tin-tech-packaging/professional.css _site/tin-tech-packaging/professional.css
          cp tin-tech-packaging/tin-tech-logo.svg _site/tin-tech-packaging/tin-tech-logo.svg
          cp tin-tech-packaging/tin-tech-logo-light.svg _site/tin-tech-packaging/tin-tech-logo-light.svg

          cp -R nautical-naturals-brand/. _site/nautical-naturals-brand/
          cp -R nautical-naturals/. _site/nautical-naturals/

          touch _site/.nojekyll

          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Public Brand Sites</title>
            <style>
              body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;padding:48px;background:#f5f3ee;color:#12324a}
              main{max-width:760px;margin:auto}
              a{display:block;margin:14px 0;padding:18px 20px;border:1px solid #d8d2c8;border-radius:16px;background:#fff;color:#12324a;text-decoration:none;font-weight:700}
            </style>
          </head>
          <body>
            <main>
              <h1>Public Brand Sites</h1>
              <a href="./nautical-naturals-brand/">Nautical Naturals</a>
              <a href="./tin-tech-packaging/">Tin Tech Packaging</a>
            </main>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
