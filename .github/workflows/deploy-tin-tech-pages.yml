name: Deploy Public Brand Sites to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'tin-tech-packaging/**'
      - 'mako-site-source/**'
      - '.github/workflows/deploy-tin-tech-pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare isolated public sites
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/tin-tech-packaging
          mkdir -p _site/mako-pet-food
          mkdir -p _site/nautical-naturals-brand
          mkdir -p _site/nautical-naturals

          cp tin-tech-packaging/index.html _site/tin-tech-packaging/index.html
          cp tin-tech-packaging/about.html _site/tin-tech-packaging/about.html
          cp tin-tech-packaging/capabilities.html _site/tin-tech-packaging/capabilities.html
          cp tin-tech-packaging/portfolio.html _site/tin-tech-packaging/portfolio.html
          cp tin-tech-packaging/product.html _site/tin-tech-packaging/product.html
          cp tin-tech-packaging/contact.html _site/tin-tech-packaging/contact.html
          cp tin-tech-packaging/privacy.html _site/tin-tech-packaging/privacy.html
          cp tin-tech-packaging/terms.html _site/tin-tech-packaging/terms.html
          cp tin-tech-packaging/404.html _site/tin-tech-packaging/404.html
          cp tin-tech-packaging/robots.txt _site/tin-tech-packaging/robots.txt
          cp tin-tech-packaging/sitemap.xml _site/tin-tech-packaging/sitemap.xml
          cp tin-tech-packaging/tin-tech-logo.svg _site/tin-tech-packaging/tin-tech-logo.svg
          cp tin-tech-packaging/tin-tech-logo-light.svg _site/tin-tech-packaging/tin-tech-logo-light.svg
          cp -R tin-tech-packaging/assets _site/tin-tech-packaging/assets
          cp -R tin-tech-packaging/admin _site/tin-tech-packaging/admin

          python3 mako-site-source/run-build.py _site/mako-pet-food

          test -f _site/mako-pet-food/index.html
          test -f _site/mako-pet-food/products.html
          test -f _site/mako-pet-food/review.html
          test -s _site/mako-pet-food/assets/images/mako-pack.jpg
          grep -q 'MAKO' _site/mako-pet-food/index.html
          grep -q 'mako_brand_feedback' _site/mako-pet-food/assets/js/site.js
          if grep -Rqi 'Nautical Naturals' _site/mako-pet-food; then
            echo 'Old brand reference detected in MAKO build.' >&2
            exit 1
          fi

          cat > _site/nautical-naturals-brand/index.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="refresh" content="0; url=../mako-pet-food/"><link rel="canonical" href="../mako-pet-food/"><title>MAKO</title></head><body><p><a href="../mako-pet-food/">Open MAKO</a></p></body></html>
          HTML
          cp _site/nautical-naturals-brand/index.html _site/nautical-naturals/index.html

          touch _site/.nojekyll

          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Public Brand Sites</title>
            <style>
              body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;padding:48px;background:#f5f3ee;color:#12324a}
              main{max-width:760px;margin:auto}
              a{display:block;margin:14px 0;padding:18px 20px;border:1px solid #d8d2c8;border-radius:16px;background:#fff;color:#12324a;text-decoration:none;font-weight:700}
            </style>
          </head>
          <body>
            <main>
              <h1>Public Brand Sites</h1>
              <a href="./mako-pet-food/">MAKO Premium Dog &amp; Cat Food</a>
              <a href="./tin-tech-packaging/">Tin Tech Packaging</a>
            </main>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful MAKO deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const path = '.deploy-status/mako-pages.txt';
            let sha;
            try {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: 'main'
              });
              sha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const body = [
              'MAKO GitHub Pages deployment completed successfully.',
              `Source commit: ${context.sha}`,
              `Pages URL: ${{ steps.deployment.outputs.page_url }}`,
              `Completed: ${new Date().toISOString()}`,
              ''
            ].join('\n');
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'Record successful MAKO Pages deployment',
              content: Buffer.from(body).toString('base64'),
              branch: 'main',
              ...(sha ? { sha } : {})
            });
